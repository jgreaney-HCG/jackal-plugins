# Ruff configuration for jackal-plugins.
#
# This repo is a Claude Code plugin marketplace — its substance is Markdown
# (skill text, agent prompts) and JSON config. The Python surface is small: the
# CI helper scripts under scripts/ and the security hooks (+ their tests) under
# plugins/ed3d-hook-security-hardening/hooks/. There is no application package,
# so this config governs standalone utility scripts, not an importable library.
#
# Scope is deliberately lean rather than `select = ["ALL"]`: for a handful of
# utility scripts, ALL is mostly noise (test-idiom warnings, shebang-exec nits).
# We enable the high-signal rule groups — real bugs, unused/undefined names,
# import order, modern-syntax upgrades, and common simplifications — and let the
# formatter handle style. This repo's CI does not run ruff; this config governs
# local runs and the implementor's "run ruff format before commit" guidance.

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes — real bugs, unused/undefined names
    "I",    # isort — import ordering
    "UP",   # pyupgrade — modern syntax
    "B",    # flake8-bugbear — likely bugs
    "SIM",  # flake8-simplify
]
