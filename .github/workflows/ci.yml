name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  json-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON syntax
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; fail=1; }
          done < <(find .claude-plugin plugins -name '*.json' -print0)
          exit $fail

  trace-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/trace-deps.sh

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/check-version-sync.py

  frontmatter-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python3 scripts/check-frontmatter.py

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run security-hardening hook tests
        working-directory: plugins/ed3d-hook-security-hardening/hooks
        run: |
          python3 test-check-bash-secrets.py
          python3 test-check-sensitive-file.py
